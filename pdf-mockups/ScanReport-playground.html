<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#111; --mut:#555; --faint:#777; --line:#cfcfcf;
    --red:#c0282d; --paper:#fff;
    --safe:#1d7a3a; --caution:#b8770a; --nogo:#c0282d;
  }
  body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:#5f6064;color:#111;
    -webkit-font-smoothing:antialiased}
  .app{display:flex;align-items:flex-start}

  /* ---------- control panel ---------- */
  .panel{width:312px;flex:0 0 312px;height:100vh;position:sticky;top:0;overflow:auto;
    background:#1c1d20;color:#e8e8ea;padding:0 0 40px}
  .panel h1{font-size:13px;letter-spacing:.1em;text-transform:uppercase;padding:14px 16px;
    background:#000;color:#fff;border-bottom:2px solid var(--red);position:sticky;top:0;z-index:2}
  .panel .grp{border-bottom:1px solid #2c2d31;padding:12px 16px}
  .panel .grp > .gt{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#7f8088;margin-bottom:9px}
  .row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .row:last-child{margin-bottom:0}
  .row label{font-size:12px;color:#cfcfd3;flex:1}
  .panel select,.panel input[type=text],.panel input[type=date]{background:#2b2c30;color:#fff;
    border:1px solid #44454a;border-radius:5px;padding:6px 8px;font-size:12.5px;width:100%}
  .row.split label{flex:0 0 92px} .row.split select,.row.split input{flex:1}
  .panel input[type=checkbox]{width:16px;height:16px;accent-color:var(--red)}
  .panel input[type=color]{width:34px;height:26px;border:1px solid #44454a;border-radius:5px;background:#2b2c30;padding:1px}
  .btn{background:var(--red);color:#fff;border:0;border-radius:6px;padding:9px 14px;font-weight:700;
    letter-spacing:.03em;cursor:pointer;font-size:12.5px;width:100%}
  .btn.ghost{background:#3a3b40} .btn.small{width:auto;padding:7px 11px}
  .btnrow{display:flex;gap:8px}
  .panel .seg{display:flex;background:#2b2c30;border-radius:6px;overflow:hidden;border:1px solid #44454a}
  .panel .seg button{flex:1;background:none;border:0;color:#bcbcc2;padding:7px 4px;font-size:11.5px;cursor:pointer}
  .panel .seg button.on{background:var(--red);color:#fff;font-weight:700}
  .menu-toggle{display:none}

  /* ---------- paper ---------- */
  .main{flex:1;min-width:0}
  .stack{padding:24px 0 60px;display:flex;flex-direction:column;align-items:center;gap:20px}
  .sheet{background:var(--paper);position:relative;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .content{position:absolute;overflow:hidden}
  .watermark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;z-index:0}
  .watermark span{font-size:120px;font-weight:900;color:rgba(192,40,45,.10);
    transform:rotate(-32deg);letter-spacing:.1em;text-transform:uppercase}
  .content,.lh,.foot,.header-wrap{position:relative;z-index:1}

  h2.sec{font-size:10.5pt;letter-spacing:.12em;text-transform:uppercase;color:#111;
    border-bottom:1px solid var(--line);padding-bottom:4px;margin:0 0 10px}
  .block{margin-bottom:var(--bgap,14px)}
  .block:last-child{margin-bottom:0}
  .faint{color:var(--faint)}

  .lh{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
    border-bottom:3px solid #111;padding-bottom:10px}
  .lh img{height:60px;width:auto}
  .lh .co .nm{font-size:15pt;font-weight:800;letter-spacing:.04em;text-transform:uppercase;line-height:1}
  .lh .co .sub{font-size:8.5pt;color:var(--red);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
  .lh .co .addr{font-size:7.5pt;color:var(--faint);margin-top:4px;line-height:1.4}
  .lh .box{font-size:8pt;text-align:right;line-height:1.5;border-left:1px solid var(--line);padding-left:12px}
  .lh .box b{display:block;color:var(--mut);font-size:7pt;letter-spacing:.08em;text-transform:uppercase}
  .lh .box .v{font-size:9.5pt;font-weight:700;margin-bottom:4px}
  /* company name lettering is swappable (header font only) */
  .lh .co .nm,.rh .nm{font-family:var(--co-font,'Segoe UI',system-ui,sans-serif)}
  .rh{display:flex;align-items:center;gap:10px;border-bottom:2px solid #111;padding-bottom:7px}
  .rh .nm{font-size:10.5pt;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
  .rh .meta{margin-left:auto;font-size:7.5pt;color:var(--faint)}
  .header-wrap{margin-bottom:14px}
  .foot{position:absolute;display:flex;justify-content:space-between;align-items:center;
    border-top:1px solid var(--line);padding-top:5px;font-size:7.5pt;color:var(--faint)}
  .foot .c{letter-spacing:.1em;text-transform:uppercase}

  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 28px;font-size:9.5pt}
  .pgrid .r{display:flex;justify-content:space-between;border-bottom:1px dotted #e2e2e2;padding:3px 0}
  .pgrid .r b{color:var(--mut);font-weight:600}
  .summary{font-size:9.5pt;line-height:1.5;color:#222}
  table.find{width:100%;border-collapse:collapse;font-size:9pt}
  table.find th{background:#f0f0f0;text-transform:uppercase;font-size:7.5pt;letter-spacing:.08em;
    text-align:left;padding:6px 8px;border:1px solid #ccc;color:#333}
  table.find td{padding:6px 8px;border:1px solid #d8d8d8;vertical-align:top}
  .pill{display:inline-block;font-size:7.5pt;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;padding:2px 8px;border-radius:10px;color:#fff}
  .pill.safe{background:var(--safe)} .pill.caution{background:var(--caution)} .pill.nogo{background:var(--nogo)}

  .scard{border:1px solid #cfcfcf;border-radius:4px;overflow:hidden}
  .scard .hd{display:flex;justify-content:space-between;align-items:center;
    background:#fafafa;border-bottom:1px solid #e3e3e3;padding:6px 8px;gap:8px}
  .scard .hd .t{font-weight:700;font-size:10pt}
  .scard .hd .m{font-size:8pt;color:var(--faint)}
  .cardtools{display:flex;gap:4px;align-items:center;flex-shrink:0}
  .cardtools button{border:1px solid #ccc;background:#fff;border-radius:4px;width:24px;height:22px;
    cursor:pointer;font-size:12px;line-height:1;color:#333;padding:0}
  .cardtools button:hover{background:#f0f0f0}
  .cardtools select{font-size:10px;border:1px solid #ccc;border-radius:4px;padding:2px}
  .cardtools .del{color:var(--red);border-color:#e6b3b5}
  .cstats{display:flex;background:#fff;border-bottom:1px solid #e3e3e3}
  .cstats div{flex:1;padding:5px 10px;border-right:1px solid #eee;font-size:8.5pt;font-weight:600}
  .cstats div:last-child{border-right:none}
  .cstats b{display:block;font-size:6.6pt;color:var(--mut);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px}
  .scard .bd{display:grid;grid-template-columns:1.45fr 1fr;gap:10px;padding:10px}
  .radar{height:150px;border:1px solid #888;border-radius:2px;position:relative;overflow:hidden;
    background:repeating-linear-gradient(0deg,#0b0b0b 0 2px,#1b1b1b 2px 5px,#0f0f0f 5px 9px),
      linear-gradient(180deg,#222,#000)}
  .size-compact .radar{height:110px}
  .size-tall .radar{height:210px}
  .radar .scale{position:absolute;left:0;top:0;bottom:0;width:26px;background:#111;color:#bbb;
    font-size:6.5pt;border-right:1px solid #444;display:flex;flex-direction:column;
    justify-content:space-between;padding:3px 2px;text-align:center}
  .radar .reb{position:absolute;width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle,#fff 0 30%,#ffd23f 45%,transparent 70%)}
  .radar .hyp{position:absolute;border:2px solid transparent;border-radius:50%}
  .radar .cap{position:absolute;bottom:3px;right:5px;color:#9aa;font-size:6.5pt}
  .legend{font-size:8.5pt;line-height:1.7}
  .legend .k{display:inline-block;width:11px;height:11px;border:1px solid #333;
    vertical-align:-1px;margin-right:6px;border-radius:2px}
  .cobs{padding:7px 10px;border-top:1px solid #eee;font-size:8.5pt;color:#333;line-height:1.45}
  .cobs b{color:#000}
  .disc{border-top:1px solid #bbb;padding-top:8px;font-size:8pt;line-height:1.5;color:#444}
  .notes{font-size:8.5pt;line-height:1.5;color:#2a2a2a}
  .notes li{margin:0 0 4px 16px}
  .sig{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;font-size:9pt}
  .sig .slot{border-top:1px solid #999;padding-top:5px}
  .sig .slot b{display:block;font-size:7.5pt;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
  [contenteditable]:focus{outline:2px solid #8ab4ff;outline-offset:1px;border-radius:2px}

  #measurer{position:absolute;left:-9999px;top:0;visibility:hidden}

  @media (max-width:820px){
    .app{flex-direction:column}
    .panel{width:100%;flex:none;height:auto;position:static}
    .menu-toggle{display:block;position:fixed;right:12px;bottom:12px;z-index:60;width:auto;
      box-shadow:0 4px 14px rgba(0,0,0,.5)}
    .panel.collapsed .grp{display:none}
  }
  @media print{
    body{background:#fff}
    .panel,.menu-toggle{display:none !important}
    .cardtools{display:none !important}
    .stack{padding:0;gap:0}
    .sheet{box-shadow:none;page-break-after:always;margin:0}
    .sheet:last-child{page-break-after:auto}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="panel" id="panel">
    <h1>ScanReport · Pure B</h1>

    <div class="grp">
      <div class="gt">Scan locations — reorder / add / remove</div>
      <div id="loc-controls"></div>
      <button class="btn small" id="add-loc" style="margin-top:8px;width:100%">＋ Add scan location</button>
    </div>

    <div class="grp">
      <div class="gt">Layout</div>
      <div class="row split"><label>Header</label>
        <select id="opt-header">
          <option value="page1">Page 1 only</option>
          <option value="slim">Pg 1 + slim line</option>
          <option value="every">Every page</option>
        </select></div>
      <div class="row split"><label>Card size</label>
        <div class="seg" id="seg-size">
          <button data-v="compact">Compact</button>
          <button data-v="normal" class="on">Normal</button>
          <button data-v="tall">Tall</button></div></div>
      <div class="row split"><label>Paper</label>
        <div class="seg" id="seg-paper">
          <button data-v="letter" class="on">Letter</button>
          <button data-v="a4">A4</button></div></div>

  const reb=[[70,42],[120,40],[170,43],[220,41]].map(p=>`<div class="reb" style="left:${p[0]}px;top:${p[1]}px"></div>`).join('');
  const hy=c.hyp?`<div class="hyp" style="left:${c.hyp.l}px;top:64px;width:${c.hyp.w}px;height:${c.hyp.h}px;border-top-color:${c.hyp.c}"></div>`:'';
  return `<div class="radar"><div class="scale"><span>0</span><span>100</span><span>200</span></div>${reb}${hy}<div class="cap">GPR B-scan · 1.6 GHz</div></div>`;
}
function cardBlock(i){
  const c=locs[i];
  const stats=opts.stats?`<div class="cstats">
    <div><b>Cover</b><span contenteditable data-i="${i}" data-f="cover">${c.cover}</span></div>
    <div><b>Spacing</b><span contenteditable data-i="${i}" data-f="spacing">${c.spacing}</span></div>
    <div><b>Max depth</b><span contenteditable data-i="${i}" data-f="depth">${c.depth}</span></div>
    <div><b>Targets</b><span contenteditable data-i="${i}" data-f="targets">${c.targets}</span></div></div>`:'';
  const obs=opts.obs?`<div class="cobs"><b>Observation.</b> <span contenteditable data-i="${i}" data-f="obs">${c.obs}</span></div>`:'';
  return `<div class="block scan-block">
    <h2 class="sec">Scan Location — Grid ${c.label} (Core ${c.label})</h2>
    <div class="scard"><div class="hd">
      <span class="t" contenteditable data-i="${i}" data-f="title">${c.title}</span>
      <span class="cardtools">
        <select data-i="${i}" class="vsel">
          <option value="safe"${c.verdict==='safe'?' selected':''}>Safe</option>
          <option value="caution"${c.verdict==='caution'?' selected':''}>Caution</option>
          <option value="nogo"${c.verdict==='nogo'?' selected':''}>No-go</option></select>
        <button data-i="${i}" class="up" title="Move up">▲</button>
        <button data-i="${i}" class="down" title="Move down">▼</button>
        <button data-i="${i}" class="del" title="Remove">✕</button></span></div>
      ${stats}
      <div class="bd">${radar(c)}
        <div class="legend">
          <div><span class="k" style="background:#111"></span>Rebar — top mat, ~45 mm</div>
          <div><span class="k" style="background:#2b6cff"></span>Post-tension tendon</div>
          <div><span class="k" style="background:#c0282d"></span>Conduit / no-scan zone</div>
          <div style="margin-top:6px" class="faint">Targets chalk-marked on slab in matching colours.</div>
        </div></div>${obs}</div></div>`;
}
function infoBlock(){return `<div class="block"><h2 class="sec">Project Information</h2>
  <div class="pgrid"><div>
    <div class="r"><b>Site</b><span>${esc(meta.site)}</span></div>
    <div class="r"><b>Client</b><span>${esc(meta.client)}</span></div>
    <div class="r"><b>Structure</b><span>Level-2 parkade suspended deck</span></div>
    <div class="r"><b>Scan date</b><span>${esc(meta.date)}</span></div></div>
  <div>
    <div class="r"><b>Equipment</b><span>GSSI StructureScan Mini XT</span></div>
    <div class="r"><b>Slab type</b><span>200 mm two-way, post-tensioned</span></div>
    <div class="r"><b>Operator</b><span>${esc(meta.operator)}</span></div>
    <div class="r"><b>Project no.</b><span>${esc(meta.project)}</span></div></div></div></div>`;}
function summaryBlock(){return `<div class="block"><h2 class="sec">Scan Summary</h2>
  <p class="summary" contenteditable data-i="-1" data-f="summary">Ground-penetrating radar survey performed on the level-2
  suspended deck to locate embedded reinforcement, post-tension cables and electrical conduit prior to core
  drilling at ${locs.length} proposed location${locs.length===1?'':'s'}. Top-mat rebar identified at ~45&nbsp;mm cover on
  200&nbsp;mm centres.</p></div>`;}
function findingsBlock(){
  const rows=locs.map((c,i)=>`<tr><td><b>${c.label}</b></td><td>${c.size}</td>
    <td><span class="pill ${c.verdict}">${VERDICT_LABEL[c.verdict]}</span></td>
    <td contenteditable data-i="${i}" data-f="rec">${c.rec}</td></tr>`).join('');
  return `<div class="block"><h2 class="sec">Core Clearance Findings</h2>
    <table class="find"><thead><tr><th style="width:54px">Core</th><th style="width:48px">Size</th>
      <th style="width:92px">Verdict</th><th>Clearance &amp; recommendation</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;}
function methodBlock(){return `<div class="block"><h2 class="sec">Methodology &amp; Standard Notes</h2>
  <ol class="notes"><li>Survey performed with a GSSI StructureScan Mini XT (1.6 GHz) on orthogonal 50 mm line spacing.</li>
  <li>Depths are estimates based on an assumed dielectric for cured concrete and are ±15%.</li>
  <li>Targets marked on the slab supersede this report where any discrepancy exists.</li>
  <li>Clearances reference the marked grid origin; verify on site before cutting.</li></ol></div>`;}
function limitBlock(){return `<div class="block"><div class="disc"><b>Limitations.</b> GPR results are interpretive and
  depend on moisture, cover and congestion. Non-metallic and deeply embedded targets may not be detected.
  ${esc(meta.company)} Cutting &amp; Coring Ltd. accepts no liability for drilling outside the cleared zones
  described above. Report valid for the slab, locations and date stated.</div></div>`;}
function signBlock(){return `<div class="block"><div class="sig">
  <div class="slot"><b>Scanned by</b>${esc(meta.operator)} · GPR Technician</div>
  <div class="slot"><b>Date</b>${esc(meta.date)}</div>
  <div class="slot"><b>Reviewed by</b>________________________</div>
  <div class="slot"><b>Project no.</b>${esc(meta.project)}</div></div></div>`;}

function buildBlocks(){
  const b=[infoBlock()];
  if(opts.show.summary) b.push(summaryBlock());
  if(opts.show.findings) b.push(findingsBlock());
  for(let i=0;i<locs.length;i++) b.push(cardBlock(i));
  if(opts.show.methodology) b.push(methodBlock());
  if(opts.show.limitations) b.push(limitBlock());
  if(opts.show.signoff) b.push(signBlock());
  return b;
}

function headerHTML(idx){
  if(opts.header==='every') return `<div class="header-wrap">${fullLH()}</div>`;
  if(opts.header==='slim')  return `<div class="header-wrap">${idx===0?fullLH():slimLH()}</div>`;
  return idx===0?`<div class="header-wrap">${fullLH()}</div>`:'';
}
function measure(html,width){ measurer.style.width=width+'px'; measurer.innerHTML=html;
  const el=measurer.firstElementChild; return el?el.getBoundingClientRect().height:0; }

function render(){
  document.documentElement.style.setProperty('--red',opts.accent);
  document.documentElement.style.setProperty('--co-font',COFONT[opts.headfont]);
  document.body.style.setProperty('--bgap', opts.density==='compact'?'8px':'14px');
  const SPACING=opts.density==='compact'?8:14;
  const g=geo(); const sz=sheetSize(); const contentW=g.wpx-2*g.padS;
  const fullH=measure(`<div class="header-wrap">${fullLH()}</div>`,contentW);
  const slimH=measure(`<div class="header-wrap">${slimLH()}</div>`,contentW);
  const headerPx=idx=>{ if(opts.header==='every') return fullH;
    if(opts.header==='slim') return idx===0?fullH:slimH; return idx===0?fullH:0; };

  document.body.className='size-'+opts.size;
  const blocks=buildBlocks().map(h=>({html:h,h:measure(h,contentW)+SPACING}));
  const pages=[]; let cur=[],curH=0,idx=0;
  const avail=i=> g.hpx-g.padT-g.padB-FOOT_H-headerPx(i);
  for(const b of blocks){
    if(cur.length && curH+b.h>avail(idx)){pages.push(cur);cur=[];curH=0;idx++;}
    cur.push(b); curH+=b.h;
  }
  if(cur.length) pages.push(cur);
  const N=pages.length;
  const wm=opts.draft?`<div class="watermark"><span>Draft</span></div>`:'';
  document.getElementById('stack').innerHTML=pages.map((pg,i)=>{
    const hp=headerPx(i), top=g.padT+(hp?hp+14:0);
    return `<div class="sheet" style="width:${sz.w};height:${sz.h}">
      ${wm}${headerHTML(i)}
      <div class="content" style="left:${g.padS}px;right:${g.padS}px;top:${top}px;bottom:${g.padB}px">
        ${pg.map(b=>b.html).join('')}</div>
      <div class="foot" style="left:${g.padS}px;right:${g.padS}px;bottom:${g.padB*0.6}px">
        <span>${esc(meta.company)} Cutting &amp; Coring Ltd.</span>
        <span class="c">${esc(opts.footer)}</span>
        <span>Page ${i+1} of ${N} · ${esc(meta.project)}</span></div></div>`;
  }).join('');
  buildLocControls();
  bindReport();
}

function buildLocControls(){
  document.getElementById('loc-controls').innerHTML=locs.map((c,i)=>`
    <div class="row" style="gap:6px">
      <span style="flex:1;font-size:12px;color:#cfcfd3">Grid ${c.label} · ${VERDICT_LABEL[c.verdict]}</span>
      <button class="btn ghost small" data-i="${i}" data-act="up">▲</button>
      <button class="btn ghost small" data-i="${i}" data-act="down">▼</button>
      <button class="btn ghost small" data-i="${i}" data-act="del" style="color:#ff8a8d">✕</button>
    </div>`).join('');
  document.querySelectorAll('#loc-controls button').forEach(b=>{
    b.onclick=()=>act(b.dataset.act,+b.dataset.i);
  });
}
function act(a,i){
  if(a==='up'&&i>0){[locs[i-1],locs[i]]=[locs[i],locs[i-1]];}
  else if(a==='down'&&i<locs.length-1){[locs[i+1],locs[i]]=[locs[i],locs[i+1]];}
  else if(a==='del'&&locs.length>1){locs.splice(i,1);}
  render();
}
function addLoc(){
  const letter=String.fromCharCode(65+locs.length);
  locs.push({label:letter, title:`Grid ${letter} · new location`, size:'4&Prime;', verdict:'safe',
    cover:'45 mm', spacing:'200 mm', depth:'150 mm', targets:'Rebar only', hyp:null,
    rec:'Clear of all targets. Cleared to drill as marked.',
    obs:'No targets within standoff at the proposed centre. Safe to drill as marked.'});
  render();
}

function bindReport(){
  document.querySelectorAll('.vsel').forEach(s=>s.onchange=()=>{locs[+s.dataset.i].verdict=s.value; render();});
  document.querySelectorAll('.scard .up').forEach(b=>b.onclick=()=>act('up',+b.dataset.i));
  document.querySelectorAll('.scard .down').forEach(b=>b.onclick=()=>act('down',+b.dataset.i));
  document.querySelectorAll('.scard .del').forEach(b=>b.onclick=()=>act('del',+b.dataset.i));
  document.querySelectorAll('[contenteditable]').forEach(el=>{
    el.addEventListener('input',()=>{const i=+el.dataset.i,f=el.dataset.f; if(i>=0) locs[i][f]=el.innerHTML;});
    el.addEventListener('blur',()=>render());
  });
}

const $=id=>document.getElementById(id);
$('opt-header').onchange=e=>{opts.header=e.target.value;render();};
function seg(id,key){document.querySelectorAll('#'+id+' button').forEach(b=>b.onclick=()=>{
  opts[key]=b.dataset.v; document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.toggle('on',x===b)); render();});}
seg('seg-size','size'); seg('seg-paper','paper'); seg('seg-margin','margin'); seg('seg-density','density');
$('opt-stats').onchange=e=>{opts.stats=e.target.checked;render();};
$('opt-obs').onchange=e=>{opts.obs=e.target.checked;render();};
['summary','findings','methodology','limitations','signoff'].forEach(k=>{
  $('sec-'+k).onchange=e=>{opts.show[k]=e.target.checked;render();};});
$('opt-headfont').onchange=e=>{opts.headfont=e.target.value;render();};
$('opt-accent').oninput=e=>{opts.accent=e.target.value;render();};
$('opt-draft').onchange=e=>{opts.draft=e.target.checked;render();};
$('opt-footer').oninput=e=>{opts.footer=e.target.value;render();};
[['m-company','company'],['m-project','project'],['m-site','site'],['m-client','client'],
 ['m-operator','operator'],['m-date','date']].forEach(([id,k])=>{
  $(id).oninput=e=>{meta[k]=e.target.value;render();};});
$('add-loc').onclick=addLoc;
$('btn-print').onclick=()=>window.print();
$('menu-toggle').onclick=()=>$('panel').classList.toggle('collapsed');
$('btn-reset').onclick=()=>{loadDefaults();
  $('opt-header').value=opts.header; $('opt-stats').checked=false; $('opt-obs').checked=false;
  $('opt-headfont').value=opts.headfont;
  $('opt-accent').value=opts.accent; $('opt-draft').checked=false; $('opt-footer').value=opts.footer;
  $('m-company').value=meta.company; $('m-project').value=meta.project; $('m-site').value=meta.site;
  $('m-client').value=meta.client; $('m-operator').value=meta.operator; $('m-date').value=meta.date;
  ['summary','findings','methodology','limitations','signoff'].forEach(k=>$('sec-'+k).checked=true);
  document.querySelectorAll('.seg').forEach(sg=>sg.querySelectorAll('button').forEach(b=>
    b.classList.toggle('on', b.dataset.v===opts[sg.id.replace('seg-','')] )));
  render();};

render();
</script>
</body>
</html>
