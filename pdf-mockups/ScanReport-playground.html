<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ScanReport — Pure B Playground</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#111; --mut:#555; --faint:#777; --line:#cfcfcf;
    --red:#c0282d; --paper:#fff;
    --safe:#1d7a3a; --caution:#b8770a; --nogo:#c0282d;
  }
  body{font-family:'Segoe UI',-apple-system,system-ui,sans-serif;background:#5f6064;color:var(--ink);
    -webkit-font-smoothing:antialiased}

  /* ---- control bar ---- */
  .controls{position:sticky;top:0;z-index:50;background:#1c1d20;color:#eee;
    padding:10px 16px;display:flex;flex-wrap:wrap;gap:16px;align-items:center;
    border-bottom:2px solid var(--red);box-shadow:0 2px 10px rgba(0,0,0,.4)}
  .controls .grp{display:flex;flex-direction:column;gap:3px}
  .controls label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#9a9aa0}
  .controls select,.controls input[type=text]{background:#2b2c30;color:#fff;border:1px solid #44454a;
    border-radius:5px;padding:5px 8px;font-size:13px;min-width:140px}
  .controls .chk{flex-direction:row;align-items:center;gap:6px;margin-top:14px}
  .controls .chk label{text-transform:none;letter-spacing:0;color:#ddd;font-size:13px}
  .controls .spacer{flex:1}
  .controls button{background:var(--red);color:#fff;border:0;border-radius:6px;padding:9px 16px;
    font-weight:700;letter-spacing:.04em;cursor:pointer;font-size:13px}
  .controls button.ghost{background:#3a3b40}
  .hint{background:#26272b;color:#b9b9bf;font-size:12px;padding:7px 16px;text-align:center;
    border-bottom:1px solid #34353a}
  .hint b{color:#fff}

  /* ---- paper ---- */
  .stack{padding:28px 0 60px;display:flex;flex-direction:column;align-items:center;gap:22px}
  .sheet{width:8.5in;height:11in;background:var(--paper);position:relative;overflow:hidden;
    padding:0.55in 0.6in 0.5in;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .content{position:absolute;left:0.6in;right:0.6in;bottom:0.5in;overflow:hidden}

  h2.sec{font-size:10.5pt;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);
    border-bottom:1px solid var(--line);padding-bottom:4px;margin:0 0 10px}
  .block{margin-bottom:14px}
  .block:last-child{margin-bottom:0}
  .muted{color:var(--mut)} .faint{color:var(--faint)}

  /* letterhead (full) */
  .lh{display:grid;grid-template-columns:auto 1fr auto;gap:14px;align-items:center;
    border-bottom:3px solid var(--ink);padding-bottom:10px}
  .lh img{height:60px;width:auto}
  .lh .co .nm{font-size:15pt;font-weight:800;letter-spacing:.04em;text-transform:uppercase;line-height:1}
  .lh .co .sub{font-size:8.5pt;color:var(--red);letter-spacing:.14em;text-transform:uppercase;margin-top:3px}
  .lh .co .addr{font-size:7.5pt;color:var(--faint);margin-top:4px;line-height:1.4}
  .lh .box{font-size:8pt;text-align:right;line-height:1.5;border-left:1px solid var(--line);padding-left:12px}
  .lh .box b{display:block;color:var(--mut);font-size:7pt;letter-spacing:.08em;text-transform:uppercase}
  .lh .box .v{font-size:9.5pt;font-weight:700;margin-bottom:4px}
  /* slim running header */
  .rh{display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:7px}
  .rh .nm{font-size:10.5pt;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
  .rh .meta{margin-left:auto;font-size:7.5pt;color:var(--faint)}
  .rh .meta b{color:var(--mut)}
  .header-wrap{margin-bottom:14px}

  .foot{position:absolute;left:0.6in;right:0.6in;bottom:0.3in;display:flex;justify-content:space-between;
    align-items:center;border-top:1px solid var(--line);padding-top:5px;font-size:7.5pt;color:var(--faint)}
  .foot .c{letter-spacing:.1em;text-transform:uppercase}

  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 28px;font-size:9.5pt}
  .pgrid .row{display:flex;justify-content:space-between;border-bottom:1px dotted #e2e2e2;padding:3px 0}
  .pgrid .row b{color:var(--mut);font-weight:600}
  .summary{font-size:9.5pt;line-height:1.5;color:#222}
  table.find{width:100%;border-collapse:collapse;font-size:9pt}
  table.find th{background:#f0f0f0;text-transform:uppercase;font-size:7.5pt;letter-spacing:.08em;
    text-align:left;padding:6px 8px;border:1px solid #ccc;color:#333}
  table.find td{padding:6px 8px;border:1px solid #d8d8d8;vertical-align:top}
  .pill{display:inline-block;font-size:7.5pt;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;padding:2px 8px;border-radius:10px;color:#fff}
  .pill.safe{background:var(--safe)} .pill.caution{background:var(--caution)} .pill.nogo{background:var(--nogo)}

  .scard{border:1px solid #cfcfcf;border-radius:4px;overflow:hidden}
  .scan-block{position:relative}
  .scan-block .drag{position:absolute;right:6px;top:30px;z-index:3;font-size:11px;color:#bbb;
    cursor:grab;user-select:none}
  .scan-block.dragging{opacity:.4}
  .scan-block.drop-above .scard{box-shadow:0 -3px 0 var(--red)}
  .scard .hd{display:flex;justify-content:space-between;align-items:center;
    background:#fafafa;border-bottom:1px solid #e3e3e3;padding:7px 10px}
  .scard .hd .t{font-weight:700;font-size:10pt}
  .scard .hd .m{font-size:8pt;color:var(--faint)}
  .cstats{display:flex;background:#fff;border-bottom:1px solid #e3e3e3}
  .cstats div{flex:1;padding:5px 10px;border-right:1px solid #eee;font-size:8.5pt;font-weight:600}
  .cstats div:last-child{border-right:none}
  .cstats b{display:block;font-size:6.6pt;color:var(--mut);text-transform:uppercase;
    letter-spacing:.06em;font-weight:700;margin-bottom:1px}
  .scard .bd{display:grid;grid-template-columns:1.45fr 1fr;gap:10px;padding:10px}
  .radar{height:150px;border:1px solid #888;border-radius:2px;position:relative;overflow:hidden;
    background:repeating-linear-gradient(0deg,#0b0b0b 0 2px,#1b1b1b 2px 5px,#0f0f0f 5px 9px),
      linear-gradient(180deg,#222,#000)}
  .size-compact .radar{height:110px}
  .size-tall .radar{height:210px}
  .radar .scale{position:absolute;left:0;top:0;bottom:0;width:26px;background:#111;color:#bbb;
    font-size:6.5pt;border-right:1px solid #444;display:flex;flex-direction:column;
    justify-content:space-between;padding:3px 2px;text-align:center}
  .radar .reb{position:absolute;width:9px;height:9px;border-radius:50%;
    background:radial-gradient(circle,#fff 0 30%,#ffd23f 45%,transparent 70%)}
  .radar .hyp{position:absolute;border:2px solid transparent;border-radius:50%}
  .radar .cap{position:absolute;bottom:3px;right:5px;color:#9aa;font-size:6.5pt}
  .legend{font-size:8.5pt;line-height:1.7}
  .legend .k{display:inline-block;width:11px;height:11px;border:1px solid #333;
    vertical-align:-1px;margin-right:6px;border-radius:2px}
  .cobs{padding:7px 10px;border-top:1px solid #eee;font-size:8.5pt;color:#333;line-height:1.45}
  .cobs b{color:#000}
  .disc{border-top:1px solid #bbb;padding-top:8px;font-size:8pt;line-height:1.5;color:#444}
  .notes{font-size:8.5pt;line-height:1.5;color:#2a2a2a}
  .notes li{margin:0 0 4px 16px}
  .sig{display:grid;grid-template-columns:1fr 1fr;gap:14px 28px;font-size:9pt}
  .sig .slot{border-top:1px solid #999;padding-top:5px}
  .sig .slot b{display:block;font-size:7.5pt;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}

  /* hidden measurer */
  #measurer{position:absolute;left:-9999px;top:0;width:calc(8.5in - 1.2in);visibility:hidden}

  @media print{
    body{background:#fff}
    .controls,.hint{display:none !important}
    .stack{padding:0;gap:0}
    .sheet{box-shadow:none;page-break-after:always;margin:0}
    .sheet:last-child{page-break-after:auto}
    @page{size:letter;margin:0}
  }
</style>
</head>
<body>
<div class="controls">
  <div class="grp">
    <label>Header on pages</label>
    <select id="opt-header">
      <option value="page1">Page 1 only (default)</option>
      <option value="slim">Pg 1 full + slim line after</option>
      <option value="every">Full on every page</option>
    </select>
  </div>
  <div class="grp">
    <label>Card / photo size</label>
    <select id="opt-size">
      <option value="compact">Compact</option>
      <option value="normal" selected>Normal</option>
      <option value="tall">Tall</option>
    </select>
  </div>
  <div class="grp chk"><input type="checkbox" id="opt-stats"><label for="opt-stats">Stats strip</label></div>
  <div class="grp chk"><input type="checkbox" id="opt-obs"><label for="opt-obs">Observation line</label></div>
  <div class="grp">
    <label>Footer text</label>
    <input type="text" id="opt-footer" value="Confidential — for the named recipient" style="min-width:230px">
  </div>
  <div class="spacer"></div>
  <button class="ghost" id="btn-reset">Reset</button>
  <button id="btn-print">Print / Save PDF</button>
</div>
<div class="hint">Drag the <b>⠿ handle</b> on any scan card to reorder them, then watch the pages repack. Change the controls above to test combinations. Use <b>Print / Save PDF</b> to export.</div>

<div class="stack" id="stack"></div>
<div id="measurer"></div>

  A:{ id:'A', title:'Grid A · Bay 1 mid-span', meta:'0.9 m × 0.9 m · depth 0–200 mm',
      cover:'45 mm', spacing:'200 mm', depth:'165 mm', targets:'Rebar only', hyp:null,
      obs:'Clear cone at the proposed core centre — no targets within 60 mm. Safe to drill as marked.' },
  B:{ id:'B', title:'Grid B · Bay 2 column line', meta:'0.9 m × 0.9 m · depth 0–200 mm',
      cover:'45 mm', spacing:'200 mm', depth:'180 mm', targets:'Rebar + PT', hyp:{l:150,w:90,h:46,c:'#5aa0ff'},
      obs:'Post-tension tendon crosses within 25 mm of the proposed centre. Relocate 75 mm south and re-scan before drilling.' },
  C:{ id:'C', title:'Grid C · Bay 2 wall line', meta:'0.9 m × 0.9 m · depth 0–200 mm',
      cover:'45 mm', spacing:'200 mm', depth:'120 mm', targets:'Rebar + conduit', hyp:{l:120,w:130,h:30,c:'#ff5a5a'},
      obs:'Energised conduit detected directly beneath the proposed centre. No-go — redesign required.' },
};
const DEFAULTS = { header:'page1', size:'normal', stats:false, obs:false,
  footer:'Confidential — for the named recipient' };
let opts = {...DEFAULTS};
let order = ['A','B','C'];

// ---------- html fragments ----------
const FULL_LH = `
  <div class="lh">
    <img src="${LOGO}" alt="">
    <div class="co">
      <div class="nm">Aggarwal Kamikazes</div>
      <div class="sub">Cutting &amp; Coring Ltd.</div>
      <div class="addr">123 Industrial Way, Burnaby BC V5A 1A1 · (604) 555-0199 · scans@aggarwalkamikazes.ca</div>
    </div>
    <div class="box"><b>Project</b><div class="v">${PROJ}</div>
      <b>Operator</b><div class="v">D. Cunningham</div><b>Date</b><div class="v">2026-05-28</div></div>
  </div>`;
const SLIM_LH = `
  <div class="rh"><span class="nm">Aggarwal Kamikazes</span>
    <span class="meta"><b>GPR Scan Report</b> · ${PROJ} · 1450 Industrial Way, Burnaby BC</span></div>`;

function radar(card){
  const reb=[[70,42],[120,40],[170,43],[220,41]].map(p=>`<div class="reb" style="left:${p[0]}px;top:${p[1]}px"></div>`).join('');
  const hy = card.hyp ? `<div class="hyp" style="left:${card.hyp.l}px;top:64px;width:${card.hyp.w}px;height:${card.hyp.h}px;border-top-color:${card.hyp.c}"></div>` : '';
  return `<div class="radar"><div class="scale"><span>0</span><span>100</span><span>200</span></div>${reb}${hy}<div class="cap">GPR B-scan · 1.6 GHz</div></div>`;
}
function cardHTML(id){
  const c=CARDS[id];
  const stats = opts.stats ? `<div class="cstats">
      <div><b>Cover</b>${c.cover}</div><div><b>Spacing</b>${c.spacing}</div>
      <div><b>Max depth</b>${c.depth}</div><div><b>Targets</b>${c.targets}</div></div>` : '';
  const obs = opts.obs ? `<div class="cobs"><b>Observation.</b> ${c.obs}</div>` : '';
  return `<div class="block scan-block" data-card="${id}" draggable="true">
    <h2 class="sec">Scan Location — Grid ${id} (Core ${id})</h2>
    <span class="drag" title="Drag to reorder">⠿ drag</span>
    <div class="scard"><div class="hd"><span class="t">${c.title}</span><span class="m">${c.meta}</span></div>
      ${stats}
      <div class="bd">${radar(c)}
        <div class="legend">
          <div><span class="k" style="background:#111"></span>Rebar — top mat, ~45 mm</div>
          <div><span class="k" style="background:#2b6cff"></span>Post-tension tendon</div>
          <div><span class="k" style="background:#c0282d"></span>Conduit / no-scan zone</div>
          <div style="margin-top:6px" class="faint">Targets chalk-marked on slab in matching colours.</div>
        </div></div>${obs}</div></div>`;
}

const B_INFO = `<div class="block"><h2 class="sec">Project Information</h2>
  <div class="pgrid"><div>
    <div class="row"><b>Site</b><span>1450 Industrial Way, Burnaby BC</span></div>
    <div class="row"><b>Client</b><span>Pinnacle Structural Eng.</span></div>
    <div class="row"><b>Structure</b><span>Level-2 parkade suspended deck</span></div>
    <div class="row"><b>Scan date</b><span>2026-05-28</span></div></div>
  <div>
    <div class="row"><b>Equipment</b><span>GSSI StructureScan Mini XT</span></div>
    <div class="row"><b>Slab type</b><span>200 mm two-way, post-tensioned</span></div>
    <div class="row"><b>Coverage</b><span>3 grids · 6.2 m²</span></div>
    <div class="row"><b>Project no.</b><span>${PROJ}</span></div></div></div></div>`;
const B_SUMMARY = `<div class="block"><h2 class="sec">Scan Summary</h2>
  <p class="summary">Ground-penetrating radar survey performed on the level-2 suspended deck to locate
  embedded reinforcement, post-tension cables and electrical conduit prior to core drilling at three
  proposed locations. Top-mat rebar identified at ~45&nbsp;mm cover on 200&nbsp;mm centres; a single
  post-tension tendon crosses Grid&nbsp;B; an electrical conduit run was detected beneath Grid&nbsp;C.</p></div>`;
const B_FIND = `<div class="block"><h2 class="sec">Core Clearance Findings</h2>
  <table class="find"><thead><tr><th style="width:54px">Core</th><th style="width:48px">Size</th>
    <th style="width:92px">Verdict</th><th>Clearance &amp; recommendation</th></tr></thead><tbody>
    <tr><td><b>A</b></td><td>4&Prime;</td><td><span class="pill safe">Safe</span></td>
      <td>60&nbsp;mm clear of all targets. Cleared to drill as marked.</td></tr>
    <tr><td><b>B</b></td><td>6&Prime;</td><td><span class="pill caution">Caution</span></td>
      <td>PT tendon within 25&nbsp;mm — relocate 75&nbsp;mm south and re-scan.</td></tr>
    <tr><td><b>C</b></td><td>4&Prime;</td><td><span class="pill nogo">No-go</span></td>
      <td>Directly over conduit run. Do not drill; redesign required.</td></tr></tbody></table></div>`;
const B_METHOD = `<div class="block"><h2 class="sec">Methodology &amp; Standard Notes</h2>
  <ol class="notes">
    <li>Survey performed with a GSSI StructureScan Mini XT (1.6 GHz) on orthogonal 50 mm line spacing.</li>
    <li>Depths are estimates based on an assumed dielectric for cured concrete and are ±15%.</li>
    <li>Targets marked on the slab supersede this report where any discrepancy exists.</li>
    <li>Clearances reference the marked grid origin; verify on site before cutting.</li></ol></div>`;
const B_LIMIT = `<div class="block"><div class="disc"><b>Limitations.</b> GPR results are interpretive and depend
  on moisture, cover and congestion. Non-metallic and deeply embedded targets may not be detected.
  Aggarwal Kamikazes Cutting &amp; Coring Ltd. accepts no liability for drilling outside the cleared
  zones described above. Report valid for the slab, locations and date stated.</div></div>`;
const B_SIG = `<div class="block"><div class="sig">
  <div class="slot"><b>Scanned by</b>D. Cunningham · GPR Technician</div>
  <div class="slot"><b>Date</b>2026-05-28</div>
  <div class="slot"><b>Reviewed by</b>________________________</div>
  <div class="slot"><b>Project no.</b>${PROJ}</div></div></div>`;

function buildBlocks(){
  return [B_INFO, B_SUMMARY, B_FIND, ...order.map(cardHTML), B_METHOD, B_LIMIT, B_SIG];
}

// ---------- pagination ----------
const DPI=96, PAGE_H=11*DPI, PAD_T=0.55*DPI, PAD_B=0.5*DPI, FOOT_H=34, SPACING=14;
const measurer=document.getElementById('measurer');
function measure(html){ measurer.innerHTML=html; const el=measurer.firstElementChild; return el?el.getBoundingClientRect().height:0; }
function headerH(idx){
  const full=measure(`<div class="header-wrap">${FULL_LH}</div>`);
  const slim=measure(`<div class="header-wrap">${SLIM_LH}</div>`);
  if(opts.header==='every') return full;
  if(opts.header==='slim')  return idx===0?full:slim;
  return idx===0?full:0; // page1
}
function headerHTML(idx){
  if(opts.header==='every') return `<div class="header-wrap">${FULL_LH}</div>`;
  if(opts.header==='slim')  return `<div class="header-wrap">${idx===0?FULL_LH:SLIM_LH}</div>`;
  return idx===0?`<div class="header-wrap">${FULL_LH}</div>`:'';
}
function render(){
  document.body.className='size-'+opts.size;
  const blocks=buildBlocks().map(h=>({html:h, h:measure(h)+SPACING}));
  // greedy pack
  const pages=[]; let cur=[], curH=0, idx=0;
  const avail=i=> PAGE_H - PAD_T - PAD_B - FOOT_H - headerH(i);
  for(const b of blocks){
    if(cur.length && curH + b.h > avail(idx)){ pages.push(cur); cur=[]; curH=0; idx++; }
    cur.push(b); curH += b.h;
  }
  if(cur.length) pages.push(cur);
  const N=pages.length;
  const stack=document.getElementById('stack');
  stack.innerHTML = pages.map((pg,i)=>`
    <div class="sheet">
      ${headerHTML(i)}
      <div class="content" style="top:${(PAD_T+headerH(i)+ (headerH(i)?14:0))/DPI}in">
        ${pg.map(b=>b.html).join('')}
      </div>
      <div class="foot"><span>Aggarwal Kamikazes Cutting &amp; Coring Ltd.</span>
        <span class="c">${escapeHtml(opts.footer)}</span>
        <span>Page ${i+1} of ${N} · ${PROJ}</span></div>
    </div>`).join('');
  attachDrag();
}
function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// ---------- drag reorder ----------
let dragId=null;
function attachDrag(){
  document.querySelectorAll('.scan-block').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragId=el.dataset.card; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{dragId=null; document.querySelectorAll('.scan-block').forEach(x=>x.classList.remove('dragging','drop-above'));});
    el.addEventListener('dragover',e=>{e.preventDefault(); el.classList.add('drop-above');});
    el.addEventListener('dragleave',()=>el.classList.remove('drop-above'));
    el.addEventListener('drop',e=>{
      e.preventDefault();
      const target=el.dataset.card;
      if(!dragId||dragId===target) return;
      order=order.filter(x=>x!==dragId);
      order.splice(order.indexOf(target),0,dragId);
      render();
    });
  });
}

// ---------- controls ----------
const $=id=>document.getElementById(id);
$('opt-header').addEventListener('change',e=>{opts.header=e.target.value; render();});
$('opt-size').addEventListener('change',e=>{opts.size=e.target.value; render();});
$('opt-stats').addEventListener('change',e=>{opts.stats=e.target.checked; render();});
$('opt-obs').addEventListener('change',e=>{opts.obs=e.target.checked; render();});
$('opt-footer').addEventListener('input',e=>{opts.footer=e.target.value; render();});
$('btn-print').addEventListener('click',()=>window.print());
$('btn-reset').addEventListener('click',()=>{
  opts={...DEFAULTS}; order=['A','B','C'];
  $('opt-header').value=opts.header; $('opt-size').value=opts.size;
  $('opt-stats').checked=opts.stats; $('opt-obs').checked=opts.obs; $('opt-footer').value=opts.footer;
  render();
});

render();
</script>
</body>
</html>
