<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <title>AK ScanReport</title>
    <script>
      // Honor saved theme before React mounts to avoid a flash
      (function() {
        try {
          var t = localStorage.getItem('ak_theme');
          if (t === 'light' || t === 'dark') {
            document.documentElement.dataset.theme = t;
          }
        } catch (e) {}
      })();
    </script>
    <style>
      :root, :root[data-theme="dark"] { --ak-init-bg: #000; }
      :root[data-theme="light"]       { --ak-init-bg: #fff; }
      html, body, #root {
        margin: 0;
        padding: 0;
        background: var(--ak-init-bg, #000);
        min-height: 100vh;
        -webkit-tap-highlight-color: transparent;
      }
      * { -webkit-text-size-adjust: 100%; }
      /* The printed page canvas takes its background from <html>. In dark theme
         that base is #000, which prints as a black frame around the page (the
         component's @media print override doesn't reach the print canvas in
         Electron printToPDF). Force the document base white on print so the
         paper is always clean white, regardless of the on-screen theme. */
      @media print {
        :root, :root[data-theme="dark"], :root[data-theme="light"] { --ak-init-bg: #fff !important; }
        html, body, #root { background: #fff !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
