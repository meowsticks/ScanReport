<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" href="/favicon.svg" />
    <title>AK ScanReport</title>
    <script>
      // Paint the saved theme's background before the bundle runs (no flash).
      // The theme engine (src/theme/engine.js) stores the active bg here on
      // every apply(); the legacy 'ak_theme' fallback covers the first launch
      // after updating from the pre-engine build.
      (function() {
        try {
          var bg = localStorage.getItem('ak-theme-bg');
          if (!bg) {
            bg = localStorage.getItem('ak_theme') === 'light' ? '#f6f3ec' : '#14171c';
          }
          document.documentElement.style.setProperty('--ak-init-bg', bg);
        } catch (e) {}
      })();
    </script>
    <style>
      :root { --ak-init-bg: #14171c; }
      html, body, #root {
        margin: 0;
        padding: 0;
        /* --color-bg/-text arrive when the engine inits in main.jsx */
        background: var(--color-bg, var(--ak-init-bg));
        color: var(--color-text, inherit);
        min-height: 100vh;
        -webkit-tap-highlight-color: transparent;
      }
      * { -webkit-text-size-adjust: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
