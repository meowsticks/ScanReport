name: Build desktop app

# Builds the installable AK ScanReport Windows app (.exe).
#
# How to use:
#   - Automatic: every push to `master` builds the installer and publishes it to
#     the rolling "latest" prerelease (stable download link in Releases).
#   - Manual: GitHub > Actions > "Build desktop app" > Run workflow.
#   - On a version tag (e.g. `git tag v1.0.0 && git push --tags`): the installer
#     is attached to a versioned GitHub Release.

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

defaults:
  run:
    working-directory: gssi-report-app

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gssi-report-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run app:build:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            gssi-report-app/release/*.exe
            gssi-report-app/release/*.blockmap
          if-no-files-found: warn

      - name: Publish installer to Release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'latest' }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest build' }}
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          files: gssi-report-app/release/*.exe
