name: Build desktop app

# Builds the installable AK ScanReport Windows app (.exe).
#
# How to use:
#   - Push to `master`: builds the installer and uploads it under the run's
#     "Artifacts" as a test build. It does NOT publish a release.
#   - Manual: GitHub > Actions > "Build desktop app" > Run workflow (artifact only).
#   - On a version tag (e.g. `git tag v1.0.1 && git push origin v1.0.1`): builds
#     and publishes a versioned GitHub Release, including the `latest.yml`
#     metadata that powers the in-app auto-updater.

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

defaults:
  run:
    working-directory: gssi-report-app

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: gssi-report-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer (master / manual run, no release)
        if: github.ref_type != 'tag'
        run: npm run app:build:win

      - name: Build & publish release (tagged builds)
        if: github.ref_type == 'tag'
        run: npm run app:publish:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            gssi-report-app/release/*.exe
            gssi-report-app/release/*.blockmap
            gssi-report-app/release/latest.yml
          if-no-files-found: warn
